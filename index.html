<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LikeB1kes | Daily Stage Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1015;--panel:#121922;--panel2:#18212d;--text:#e8eef5;--muted:#9fb0c3;--accent:#39d0c8;--border:#283445;--road:#2f7eea;--mtb:#d8892b;--gravel:#7b8b52}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(180deg,#091017,#0f1722);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:24px}
    .hero{padding:28px;border:1px solid var(--border);border-radius:20px;background:rgba(18,25,34,.9);margin-bottom:24px}
    h1{margin:0 0 8px;font-size:clamp(2rem,4vw,3.8rem)} p{color:var(--muted)}
    .controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    select{background:var(--panel2);color:var(--text);border:1px solid var(--border);padding:12px 14px;border-radius:12px}
    .day{margin:18px 0 26px}
    .dayhead{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:10px}
    .dayhead h2{margin:0;font-size:1.25rem}.count{color:var(--muted);font-size:.95rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px}
    .top{display:flex;justify-content:space-between;gap:8px;align-items:start;margin-bottom:10px}
    .badge{font-size:.78rem;padding:6px 10px;border-radius:999px;font-weight:700}
    .Road{background:rgba(47,126,234,.18);color:#9dc3ff}.MTB{background:rgba(216,137,43,.18);color:#ffd39e}.Gravel{background:rgba(123,139,82,.2);color:#d1dfaa}
    .race{font-size:1.08rem;font-weight:800}.race a{color:var(--text);text-decoration:none}.race a:hover{color:var(--accent);text-decoration:underline}
    .stage{color:var(--accent);font-weight:700;margin-top:4px}
    .meta{display:grid;gap:8px;margin-top:14px}.meta div{color:var(--muted);font-size:.94rem}.meta strong{color:var(--text)}
    .streams{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:grid;gap:8px;font-size:.92rem}
    .helper{font-size:.9rem;color:var(--muted);margin-top:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>LikeB1kes daily stage guide</h1>
      <p>Current and upcoming cycling coverage for UK, USA, and Canada viewers. Race titles open the official race sites in a new tab.</p>
      <div class="controls">
        <select id="discipline"><option value="all">All disciplines</option><option value="Road">Road</option><option value="MTB">MTB</option><option value="Gravel">Gravel</option></select>
      </div>
      <div class="helper">Tip: click a race title to open the official event page.</div>
    </section>
    <main id="app"></main>
  </div>
<script>
const app=document.getElementById('app');
const discipline=document.getElementById('discipline');
let races=[];
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric',year:'numeric'});} 
function render(){
  const disc=discipline.value;
  const filtered=races.filter(r=>disc==='all'||r.discipline===disc);
  const grouped=filtered.reduce((acc,r)=>{(acc[r.date]??=[]).push(r);return acc;},{});
  const dates=Object.keys(grouped).sort();
  app.innerHTML=dates.map(date=>`<section class="day"><div class="dayhead"><h2>${fmtDate(date)}</h2><div class="count">${grouped[date].length} item(s)</div></div><div class="cards">${grouped[date].map(r=>`<article class="card"><div class="top"><div><div class="race"><a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.race}</a></div><div class="stage">${r.stage}</div></div><span class="badge ${r.discipline}">${r.discipline}</span></div><div class="meta"><div><strong>Route:</strong> ${r.route}</div><div><strong>Profile:</strong> ${r.profile}</div><div><strong>Distance:</strong> ${r.distance}</div></div><div class="streams"><div><strong>UK:</strong> ${r.uk}</div><div><strong>USA:</strong> ${r.usa}</div><div><strong>Canada:</strong> ${r.canada}</div></div></article>`).join('')}</div></section>`).join('');
}
fetch('./races.json').then(r=>r.json()).then(d=>{races=d;render()});
discipline.addEventListener('change',render);
</script>
</body>
</html>
