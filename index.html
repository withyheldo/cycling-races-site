<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LikeB1kes | Full Stage Profiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1015;--panel:#121922;--panel2:#18212d;--text:#e8eef5;--muted:#9fb0c3;--accent:#39d0c8;--border:#283445}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(180deg,#091017,#0f1722);color:var(--text)}
    .wrap{max-width:1160px;margin:0 auto;padding:24px}
    .hero{padding:28px;border:1px solid var(--border);border-radius:20px;background:rgba(18,25,34,.9);margin-bottom:24px}
    h1{margin:0 0 8px;font-size:clamp(2rem,4vw,3.8rem)} p{color:var(--muted)}
    .day{margin:18px 0 26px}.dayhead{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:10px}
    .dayhead h2{margin:0;font-size:1.25rem}.count{color:var(--muted);font-size:.95rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px}
    .top{display:flex;justify-content:space-between;gap:8px;align-items:start;margin-bottom:10px}
    .badge{font-size:.78rem;padding:6px 10px;border-radius:999px;font-weight:700;background:rgba(57,208,200,.12);color:#93f0e9}
    .race{font-size:1.08rem;font-weight:800}.race a{color:var(--text);text-decoration:none}.race a:hover{color:var(--accent);text-decoration:underline}
    .stage{color:var(--accent);font-weight:700;margin-top:4px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .item{padding:10px 0;border-top:1px solid var(--border);color:var(--muted);font-size:.94rem}.item strong{color:var(--text)}
    .summary{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);color:var(--muted);font-size:.95rem;line-height:1.5}
    .streams{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:grid;gap:8px;font-size:.92rem;color:var(--muted)}
    @media (max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>LikeB1kes full stage profiles</h1>
      <p>Each race card now includes a real profile summary, category, distance, elevation, and difficulty so the stages feel properly explained.</p>
    </section>
    <main id="app"></main>
  </div>
<script>
const app=document.getElementById('app');
let races=[];
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric',year:'numeric'});} 
function render(){
  const grouped=races.reduce((acc,r)=>{(acc[r.date]??=[]).push(r);return acc;},{});
  const dates=Object.keys(grouped).sort();
  app.innerHTML=dates.map(date=>`<section class="day"><div class="dayhead"><h2>${fmtDate(date)}</h2><div class="count">${grouped[date].length} item(s)</div></div><div class="cards">${grouped[date].map(r=>`<article class="card"><div class="top"><div><div class="race"><a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.race}</a></div><div class="stage">${r.stage}</div></div><span class="badge">${r.discipline}</span></div><div class="grid"><div class="item"><strong>Route:</strong> ${r.route}</div><div class="item"><strong>Category:</strong> ${r.category}</div><div class="item"><strong>Distance:</strong> ${r.distance}</div><div class="item"><strong>Elevation:</strong> ${r.elevation}</div><div class="item"><strong>Difficulty:</strong> ${r.difficulty}</div><div class="item"><strong>Region streams:</strong> UK / USA / Canada</div></div><div class="summary"><strong>Profile summary:</strong> ${r.profile_summary}</div><div class="streams"><div><strong>UK:</strong> ${r.uk}</div><div><strong>USA:</strong> ${r.usa}</div><div><strong>Canada:</strong> ${r.canada}</div></div></article>`).join('')}</div></section>`).join('');
}
fetch('./races.json').then(r=>r.json()).then(d=>{races=d;render()});
</script>
</body>
</html>
